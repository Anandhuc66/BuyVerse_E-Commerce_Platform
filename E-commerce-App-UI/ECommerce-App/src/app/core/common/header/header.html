<header class="site-header" [class.header-scrolled]="isShrunk">
  <div class="header-inner">

    <!-- LOGO -->
    <a class="header-logo" routerLink="/">
      <i class="bi bi-bag-check-fill"></i>
      <span>Buyverse</span>
    </a>

    <!-- MOBILE TOGGLER -->
    <button
      class="mobile-toggle"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#headerNav"
      aria-controls="headerNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <i class="bi bi-list"></i>
    </button>

    <!-- NAV CONTENT -->
    <div class="collapse navbar-collapse header-content" id="headerNav">

      <!-- SEARCH BAR -->
      <form class="header-search" (submit)="onSearch($event)">
        <div class="search-container">
          <i class="bi bi-search search-icon"></i>
          <input
            class="search-input"
            type="search"
            placeholder="Search for products, brands and more..."
            aria-label="Search"
            name="searchInput"
            [(ngModel)]="searchQuery"
            (input)="onTyping()"
            autocomplete="off"
            (blur)="onBlur()"
          />
          <button class="search-submit" type="submit">
            Search
          </button>

          <!-- Suggestions Dropdown -->
          <div *ngIf="showSuggestions" class="suggestion-box">
            <div
              *ngFor="let s of suggestions"
              class="suggestion-item"
              (click)="selectSuggestion(s)"
            >
              <i class="bi bi-search suggestion-icon"></i>
              {{ s }}
            </div>
            <div *ngIf="suggestions.length === 0 && !loading" class="no-result">
              No results found
            </div>
            <div *ngIf="loading" class="loading-text">Searching...</div>
          </div>
        </div>
      </form>

      <!-- RIGHT SECTION -->
      <div class="header-actions">

        <!-- CART -->
        <a
          routerLink="/cart"
          class="header-action-item cart-btn"
          (click)="animateCart($event)"
        >
          <i class="bi bi-cart3 cart-icon"></i>
          <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
          <span class="action-label">Cart</span>
        </a>

        <!-- IF NOT LOGGED IN -->
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/login" class="header-action-item login-btn">
            <i class="bi bi-person"></i>
            <span class="action-label">Login</span>
          </a>
          <a routerLink="/supplier-register/supplier-register" class="btn btn-primary btn-sm seller-btn">
            <i class="bi bi-shop me-1"></i> Become a Seller
          </a>
        </ng-container>

        <!-- IF LOGGED IN -->
        <ng-container *ngIf="isLoggedIn">
          <div class="dropdown">
            <a
              class="header-action-item account-btn"
              href="#"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <i class="bi bi-person-circle"></i>
              <span class="action-label">Account <i class="bi bi-chevron-down chevron-sm"></i></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end account-dropdown">
              <li class="dropdown-header-text">My Account</li>
              <li>
                <a class="dropdown-item" routerLink="/user/profile">
                  <i class="bi bi-person me-2"></i> Profile
                </a>
              </li>
              <li>
                <a class="dropdown-item" routerLink="/user/orders">
                  <i class="bi bi-box-seam me-2"></i> My Orders
                </a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <button class="dropdown-item text-danger" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i> Logout
                </button>
              </li>
            </ul>
          </div>
        </ng-container>

      </div>
    </div>
  </div>
</header>
