<div class="main-container">
    <div>
        <div>
        <h5>Orders</h5>
        </div>        
        <div class="filter-inputs">
            <div class="row">
                <div class="col-md-3">
                    <label class="form-label">Search</label>
                    <div class="input-container">
                        <input type="text" class="form-control" placeholder="Search by customer or order ID" [(ngModel)]="searchText" (keyup.enter)="applyFilters()">
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Payment Type</label>
                    <div class="input-container">
                        <select class="form-select formMainSelectdiv" [(ngModel)]="selectedPaymentMethod">
                            <option value="">All</option>
                            <option *ngFor="let m of paymentMethods" [value]="m">{{m}}</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Payment Status</label>
                    <div class="input-container">
                        <select class="form-select formMainSelectdiv" [(ngModel)]="selectedPaymentStatus">
                            <option value="">All</option>
                            <option *ngFor="let s of paymentStatuses" [value]="s">{{s}}</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Delivery Status</label>
                    <div class="input-container">
                        <select class="form-select formMainSelectdiv" [(ngModel)]="selectedDeliveryStatus">
                            <option value="">All</option>
                            <option *ngFor="let s of deliveryStatuses" [value]="s">{{s}}</option>
                        </select>
                    </div>
                </div>
                <div class="w-auto col mt-4">
                    <button class="search-button me-2" (click)="applyFilters()">Search</button>  
                </div>
            </div>
        </div>
    </div>
    <div [hidden]="!loading" class="ag-table-card" style="height:65vh;display:flex;flex-direction:column;gap:0;">
        <div class="skeleton-table-row" *ngFor="let i of [1,2,3,4,5,6,7,8]">
            <div class="skeleton-cell skeleton-dark" style="width:60px;"></div>
            <div class="skeleton-cell skeleton-dark" style="flex:1;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:100px;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:120px;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:100px;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:120px;"></div>
        </div>
    </div>
    <div [hidden]="loading" class="ag-table-card ag-theme-quartz">
        <ag-grid-angular
            style="width: 100%; height: 65vh;"
            [columnDefs]="columnDefs"
            [rowData]="rowData"
            [pagination]="true"
            [paginationPageSize]="paginationPageSize"
            [paginationPageSizeSelector]="paginationPageSizeSelector"
            [rowHeight]="45"
            [headerHeight]="45"
            [domLayout]="'normal'"
            (gridReady)="onGridReady($event)"
            (cellClicked)="onCellClicked($event)">
        </ag-grid-angular>
    </div>
</div>
