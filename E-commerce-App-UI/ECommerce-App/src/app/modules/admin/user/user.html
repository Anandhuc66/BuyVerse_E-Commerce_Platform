<div class="main-container">
    <div>
        <div>
        <h5>Users</h5>
        </div>        
        <div class="filter-inputs">
            <div class="row">
                <div class="col-md-3">
                    <label class="form-label">Search</label>
                    <div class="input-container">
                        <input type="text" class="form-control" placeholder="Search by name" [(ngModel)]="searchText" (keyup.enter)="applyFilters()">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Gender</label>
                    <div class="input-container">
                        <select class="form-select formMainSelectdiv" [(ngModel)]="selectedGender">
                            <option value="">All</option>
                            <option *ngFor="let g of genders" [value]="g">{{g}}</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Role</label>
                    <div class="input-container">
                        <select class="form-select formMainSelectdiv" [(ngModel)]="selectedRole">
                            <option value="">All Roles</option>
                            <option *ngFor="let r of roles" [value]="r">{{r}}</option>
                        </select>
                    </div>
                </div>
                <div class="w-auto col mt-4">
                    <button class="search-button me-2" (click)="applyFilters()">Search</button>  
                </div>
            </div>
        </div>
    </div>
    <div [hidden]="!loading" class="ag-table-card" style="height:65vh;display:flex;flex-direction:column;gap:0;">
        <div class="skeleton-table-row" *ngFor="let i of [1,2,3,4,5,6,7,8]">
            <div class="skeleton-cell skeleton-dark" style="width:60px;"></div>
            <div class="skeleton-cell skeleton-dark" style="flex:1;"></div>
            <div class="skeleton-cell skeleton-dark" style="flex:1;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:120px;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:90px;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:100px;"></div>
            <div class="skeleton-cell skeleton-dark" style="width:110px;"></div>
        </div>
    </div>
    <div [hidden]="loading" class="ag-table-card ag-theme-quartz">
        <ag-grid-angular
            style="width: 100%; height: 65vh;"
            [columnDefs]="columnDefs"
            [rowData]="rowData"
            [pagination]="true"
            [paginationPageSize]="paginationPageSize"
            [paginationPageSizeSelector]="paginationPageSizeSelector"
            [rowHeight]="40"
            [headerHeight]="45"
            [domLayout]="'normal'">
        </ag-grid-angular>
    </div>
</div>
