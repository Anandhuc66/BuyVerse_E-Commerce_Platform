<div class="main-container">
  <div class="add-product-container container">
    <h2 class="mb-4 text-center">{{ isEditMode ? 'Edit Supplier' : 'Add New Supplier' }}</h2>

    <form
      [formGroup]="supplierForm"
      (ngSubmit)="onSubmit()"
      enctype="multipart/form-data"
      class="row g-3"
    >
      <!-- Row 1 -->
      <div class="row">
        <div class="col">
          <label>Company Name</label>
          <input
            type="text"
            class="form-control"
            formControlName="companyName"
            placeholder="Enter company name"
          />
        </div>

        <div class="col">
          <label>Contact Email</label>
          <input
            type="email"
            class="form-control"
            formControlName="contactEmail"
            placeholder="Enter contact email"
          />
        </div>
      </div>

      <!-- Row 2 -->
      <div class="row">
        <div class="col">
          <label>Phone</label>
          <input
            type="text"
            class="form-control"
            formControlName="phone"
            placeholder="Enter phone number"
          />
        </div>

        <div class="col" *ngIf="!isEditMode">
          <label>Full Name</label>
          <input
            type="text"
            class="form-control"
            formControlName="fullName"
            placeholder="Enter full name"
          />
        </div>
      </div>

      <!-- Row 3 -->
      <div class="row" *ngIf="!isEditMode">
        <div class="col">
          <label>Gender</label>
          <select class="form-select" formControlName="gender">
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="col">
          <label>Password</label>
          <input
            type="password"
            class="form-control"
            formControlName="password"
            placeholder="Enter password"
          />
        </div>
      </div>

      <!-- Submit button -->
      <div class="col-12 text-center mt-3">
        <button type="submit" class="btn btn-primary add-button px-4">
          {{ isEditMode ? 'Update Supplier' : 'Add Supplier' }}
        </button>
      </div>
    </form>
  </div>
</div>
