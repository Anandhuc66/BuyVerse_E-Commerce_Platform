<div class="result-page">
  <div class="result-card">
    <div class="result-icon failure-icon">
      <i class="bi bi-x-circle-fill"></i>
    </div>
    <h2 class="result-title">Payment Failed!</h2>
    <p class="result-subtitle">Something went wrong with your transaction. Please try again.</p>
    <button class="action-primary danger" (click)="tryAgain()">Try Again</button>
  </div>
</div>
