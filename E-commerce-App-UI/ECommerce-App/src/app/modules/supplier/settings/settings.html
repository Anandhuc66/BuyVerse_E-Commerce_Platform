<div class="settings-container">
  <h2 class="page-title">Settings</h2>

  <!-- Profile Section -->
  <div class="settings-card">
    <div class="card-header">
      <i class="bi bi-person-circle"></i>
      <h3>Profile Information</h3>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
      <div class="form-row">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input id="fullName" type="text" formControlName="fullName" placeholder="Enter full name" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" placeholder="Email" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phoneNumber">Phone Number</label>
          <input id="phoneNumber" type="text" formControlName="phoneNumber" placeholder="Enter phone number" />
        </div>
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" formControlName="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="message success" *ngIf="profileMessage">{{ profileMessage }}</div>
      <div class="message error" *ngIf="profileError">{{ profileError }}</div>

      <button type="submit" class="btn-save" [disabled]="profileLoading || profileForm.invalid">
        <span *ngIf="!profileLoading">Save Profile</span>
        <span *ngIf="profileLoading">Saving...</span>
      </button>
    </form>
  </div>

  <!-- Business Info Section -->
  <div class="settings-card">
    <div class="card-header">
      <i class="bi bi-building"></i>
      <h3>Business Information</h3>
    </div>

    <form [formGroup]="businessForm" (ngSubmit)="saveBusinessInfo()">
      <div class="form-row">
        <div class="form-group">
          <label for="companyName">Company Name</label>
          <input id="companyName" type="text" formControlName="companyName" placeholder="Enter company name" />
        </div>
        <div class="form-group">
          <label for="contactEmail">Contact Email</label>
          <input id="contactEmail" type="email" formControlName="contactEmail" placeholder="Enter contact email" />
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" type="text" formControlName="phone" placeholder="Enter business phone" />
      </div>

      <div class="message success" *ngIf="businessMessage">{{ businessMessage }}</div>
      <div class="message error" *ngIf="businessError">{{ businessError }}</div>

      <button type="submit" class="btn-save" [disabled]="businessLoading || businessForm.invalid">
        <span *ngIf="!businessLoading">Save Business Info</span>
        <span *ngIf="businessLoading">Saving...</span>
      </button>
    </form>
  </div>

  <!-- Password Section -->
  <div class="settings-card">
    <div class="card-header">
      <i class="bi bi-shield-lock"></i>
      <h3>Change Password</h3>
    </div>

    <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
      <div class="form-group">
        <label for="currentPassword">Current Password</label>
        <div class="password-wrapper">
          <input id="currentPassword" [type]="showCurrentPassword ? 'text' : 'password'"
            formControlName="currentPassword" placeholder="Enter current password" />
          <i class="bi" [ngClass]="showCurrentPassword ? 'bi-eye-slash' : 'bi-eye'"
            (click)="showCurrentPassword = !showCurrentPassword" (keydown.enter)="showCurrentPassword = !showCurrentPassword"></i>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-wrapper">
            <input id="newPassword" [type]="showNewPassword ? 'text' : 'password'"
              formControlName="newPassword" placeholder="Enter new password" />
            <i class="bi" [ngClass]="showNewPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="showNewPassword = !showNewPassword" (keydown.enter)="showNewPassword = !showNewPassword"></i>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input id="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'"
              formControlName="confirmPassword" placeholder="Confirm new password" />
            <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="showConfirmPassword = !showConfirmPassword" (keydown.enter)="showConfirmPassword = !showConfirmPassword"></i>
          </div>
        </div>
      </div>

      <div class="message success" *ngIf="passwordMessage">{{ passwordMessage }}</div>
      <div class="message error" *ngIf="changeError">{{ changeError }}</div>

      <button type="submit" class="btn-save" [disabled]="passwordLoading || passwordForm.invalid">
        <span *ngIf="!passwordLoading">Change Password</span>
        <span *ngIf="passwordLoading">Changing...</span>
      </button>
    </form>
  </div>
</div>
