<!-- STEP 1: Supplier Info -->
<div class="main-container">
<div class="register-container" *ngIf="!showPasswordSection">
  <h2>Supplier Registration</h2>

  <form [formGroup]="infoForm">
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" formControlName="firstName" placeholder="Enter first name" />
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" formControlName="lastName" placeholder="Enter last name" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="companyName">Company Name</label>
        <input type="text" id="companyName" formControlName="companyName" placeholder="Enter company name" />
      </div>

      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" class="select-icon" formControlName="gender">
          <option class="option-clr" disabled selected value="">Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="contactEmail">Email</label>
        <input type="email" id="contactEmail" formControlName="contactEmail" placeholder="Enter email" />
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" formControlName="phone" placeholder="Enter phone number" />
      </div>
    </div>

    <!-- Buttons -->
    <div class="form-buttons">
      <button type="button" class="btn-cancel" (click)="navigateHome()">Cancel</button>
      <button
        type="button"
        class="btn-register"
        (click)="goToPasswordSection()"
        [disabled]="!infoForm.valid"
      >
        Continue
      </button>
    </div>
  </form>
</div>

<!-- STEP 2: Password Section -->
<div class="password-container" *ngIf="showPasswordSection" [@slideIn]>
  <h2>Create Password</h2>

  <form [formGroup]="passwordForm">
    <div class="form-row">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Enter password" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="Confirm password" />
      </div>
    </div>

    <!-- Buttons -->
    <div class="form-buttons">
      <button type="button" class="btn-cancel" (click)="backToInfo()">Back</button>
      <button
        type="button"
        class="btn-register"
        (click)="onRegister()"
        [disabled]="!passwordForm.valid"
      >
        Register
      </button>
    </div>
  </form>
</div>
</div>
